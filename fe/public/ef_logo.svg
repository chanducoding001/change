<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008A2E"></stop>
      <stop offset="100%" stop-color="#A5D600"></stop>
    </linearGradient>

    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003E9E"></stop>
      <stop offset="100%" stop-color="#3CC8FF"></stop>
    </linearGradient>

    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66CC33"></stop>
      <stop offset="100%" stop-color="#00A6FF"></stop>
    </linearGradient>
  </defs>

  <!-- ENVIRONMENT C -->

  <path d="
      M470 140
      C390 70 270 60 180 110
      C90 160 70 270 110 360
    " fill="none" stroke="url(#green)" stroke-width="55" stroke-linecap="round"></path>

  <!-- TOP LEAF -->

  <path d="
      M320 95
      C380 60 450 70 520 120
      C470 145 390 145 320 95
    " fill="url(#green)"></path>

  <path d="
      M340 100
      C390 115 435 118 485 115
    " fill="none" stroke="white" stroke-width="4" opacity="0.7" stroke-linecap="round"></path>

  <!-- BRANCH -->

  <path d="
      M185 355
      C195 300 210 250 240 200
    " stroke="#007A28" stroke-width="8" fill="none"></path>

  <!-- LEAVES -->

  <ellipse cx="165" cy="220" rx="18" ry="32" fill="#9FD83C" transform="rotate(-25 165 220)"></ellipse>

  <ellipse cx="175" cy="285" rx="18" ry="32" fill="#7FD43A" transform="rotate(-25 175 285)"></ellipse>

  <ellipse cx="185" cy="350" rx="18" ry="32" fill="#69C72B" transform="rotate(-25 185 350)"></ellipse>

  <ellipse cx="250" cy="245" rx="18" ry="32" fill="#8BD93F" transform="rotate(65 250 245)"></ellipse>

  <ellipse cx="255" cy="305" rx="18" ry="32" fill="#79CC30" transform="rotate(65 255 305)"></ellipse>

  <!-- WATER HALF -->

  <path d="
      M120 380
      C210 330 320 340 410 390
      C470 425 520 420 560 380
    " fill="none" stroke="url(#blue)" stroke-width="65" stroke-linecap="round"></path>

  <path d="
      M120 390
      C220 460 370 470 510 430
    " fill="none" stroke="url(#blue)" stroke-width="55" stroke-linecap="round"></path>

  <!-- WATER HIGHLIGHT -->

  <path d="
      M150 410
      C250 455 380 455 490 415
    " fill="none" stroke="white" stroke-width="6" opacity="0.65" stroke-linecap="round"></path>

  <!-- SPLASH -->

  <path d="
      M505 360
      C535 390 545 420 520 450
    " fill="none" stroke="#3CC8FF" stroke-width="28" stroke-linecap="round"></path>

  <circle cx="520" cy="320" r="16" fill="#3CC8FF"></circle>
  <circle cx="555" cy="350" r="10" fill="#3CC8FF"></circle>

  <!-- BRAIN -->

  <g transform="translate(300 300)">
    <path d="
        M-70 -60
        C-110 -60 -120 0 -95 30
        C-115 65 -85 110 -40 105
        C-10 120 0 80 0 45
        C0 10 -25 -60 -70 -60
      " fill="none" stroke="url(#brain)" stroke-width="10"></path>

    <path d="
        M70 -60
        C110 -60 120 0 95 30
        C115 65 85 110 40 105
        C10 120 0 80 0 45
        C0 10 25 -60 70 -60
      " fill="none" stroke="url(#brain)" stroke-width="10"></path>

    <!-- LEFT NODES -->

    <circle cx="-35" cy="-15" r="10" fill="#4CAF50"></circle>
    <circle cx="-55" cy="40" r="10" fill="#4CAF50"></circle>
    <circle cx="-15" cy="65" r="10" fill="#4CAF50"></circle>

    <line x1="-35" y1="-15" x2="-55" y2="40" stroke="#4CAF50" stroke-width="4"></line>

    <line x1="-55" y1="40" x2="-15" y2="65" stroke="#4CAF50" stroke-width="4"></line>

    <!-- RIGHT NODES -->

    <circle cx="35" cy="-15" r="10" fill="#00A6FF"></circle>
    <circle cx="55" cy="40" r="10" fill="#00A6FF"></circle>
    <circle cx="15" cy="65" r="10" fill="#00A6FF"></circle>

    <line x1="35" y1="-15" x2="55" y2="40" stroke="#00A6FF" stroke-width="4"></line>

    <line x1="55" y1="40" x2="15" y2="65" stroke="#00A6FF" stroke-width="4"></line>

    <!-- THOUGHT SPARK -->

    <path d="
        M0 -18
        L10 0
        L0 18
        L-10 0
        Z
      " fill="#A5D600"></path>
  </g>
</svg>